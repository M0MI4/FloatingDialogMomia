<style>
    .elite-container {
        text-align: center;
        padding: 20px 0;
        font-family: 'Courier New', monospace;
    }

    /* ئەنیمەیشنی تێکچوون (Glitch) */
    .glitch-text {
        font-size: 2.2rem;
        font-weight: 900;
        position: relative;
        display: inline-block;
        color: #4CAF50; /* ڕەنگی سەوزی هاکەری */
        text-shadow: 0 0 10px rgba(76, 175, 80, 0.6);
        letter-spacing: 2px;
        margin-bottom: 15px;
    }

    .glitch-text::before, .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0e0e0e; /* هەمان ڕەنگی باکگراوندی تێرمیناڵەکەت */
    }

    .glitch-text::before {
        left: 2px;
        text-shadow: -2px 0 #ff00c1;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim 3s infinite linear alternate-reverse;
    }

    .glitch-text::after {
        left: -2px;
        text-shadow: -2px 0 #00fff9;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim2 2.5s infinite linear alternate-reverse;
    }

    /* کاتی جوڵەی ئەنیمەیشنەکە */
    @keyframes glitch-anim {
        0% { clip: rect(15px, 9999px, 26px, 0); }
        20% { clip: rect(8px, 9999px, 12px, 0); }
        40% { clip: rect(48px, 9999px, 54px, 0); }
        60% { clip: rect(2px, 9999px, 18px, 0); }
        80% { clip: rect(32px, 9999px, 44px, 0); }
        100% { clip: rect(55px, 9999px, 62px, 0); }
    }

    @keyframes glitch-anim2 {
        0% { clip: rect(35px, 9999px, 46px, 0); }
        20% { clip: rect(12px, 9999px, 22px, 0); }
        40% { clip: rect(58px, 9999px, 64px, 0); }
        60% { clip: rect(22px, 9999px, 28px, 0); }
        80% { clip: rect(15px, 9999px, 24px, 0); }
        100% { clip: rect(45px, 9999px, 52px, 0); }
    }

    /* بەشی خوارەوەی دەقەکە */
    .system-status {
        font-size: 0.85rem;
        color: #888;
        border-top: 1px dashed #333;
        padding-top: 15px;
        text-align: left;
        line-height: 1.5;
    }
    
    .highlight {
        color: #D4AF37; /* ڕەنگی ئاڵتوونی کۆدەکەت */
    }
</style>

<div class="elite-container">
    <div class="glitch-text" data-text="SNAP ELITE">SNAP ELITE</div>
    
    <div class="system-status">
        > ENCRYPTED PAYLOAD LOADED.<br>
        > BYPASSING SECURITY PROTOCOLS... <span style="color: #4CAF50;">[OK]</span><br>
        > INJECTING MODULES... <br>
        <span class="highlight">> ALL SYSTEMS OPERATIONAL.</span>
        <span class="highlight">> ALL SYSTEMS OPERATIONAL.</span>
        <span class="highlight">> ALL SYSTEMS OPERATIONAL.</span>
        <span class="highlight">> ALL SYSTEMS OPERATIONAL.</span>
        
       </div>
</div>
